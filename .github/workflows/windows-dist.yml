name: windows-dist

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-dist.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
      - "python/**"
      - "vendor/**"
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-dist:
    runs-on: windows-2022
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-windows-dist-py311-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'pyproject.toml', 'src/**', 'python/**', 'vendor/**', '.github/workflows/windows-dist.yml') }}
          restore-keys: |
            ${{ runner.os }}-windows-dist-py311-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'pyproject.toml') }}-
            ${{ runner.os }}-windows-dist-py311-

      - name: Install build tooling
        run: python -m pip install --upgrade pip maturin

      - name: Show toolchain versions
        run: |
          python --version
          rustc --version
          cargo --version
          maturin --version

      - name: Build wheel
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          maturin build --release --interpreter python --out dist

      - name: Smoke test wheel
        run: |
          python -m pip install --upgrade pip
          $wheel = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          python -m pip install $wheel
          @'
          import tempfile
          from pathlib import Path

          from pdf_to_images import PdfRenderQueue, RenderJob, supported_formats

          pdf_path = Path("vendor/mupdf-0.6.0/tests/files/dummy.pdf").resolve()
          output_dir = Path(tempfile.mkdtemp(prefix="pdf_to_images_"))

          queue = PdfRenderQueue(workers=2, capacity=32)
          future = queue.submit_future(
              RenderJob(
                  pdf_path=str(pdf_path),
                  output_dir=str(output_dir),
                  render_dpi=96,
                  format="jpg",
                  quality=70,
                  batch_pages=0,
              )
          )
          result = future.result()
          queue.close()

          assert result.ok, result.errors
          assert result.rendered_pages >= 1, result.rendered_pages
          assert len(result.outputs) == result.rendered_pages, result.outputs
          assert "jpg" in supported_formats(), supported_formats()
          print(result.outputs[0])
          '@ | python -

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.whl
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
